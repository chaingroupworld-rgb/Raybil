<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raybil World - Loading...</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0088cc; /* Telegram Blue */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="status">
        <div class="loader"></div>
    </div>

    <script>
        (function() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const targetURL = "https://z7x9p2q5r8v3m1k9j.raybil.tech/home.html";

            // টেলিগ্রাম ব্রাউজার চেক
            if (userAgent.includes("Telegram")) {
                // সরাসরি রিডাইরেক্ট (কোনো ডেটা লস ছাড়াই)
                window.location.replace(targetURL);
            } else {
                // যদি অন্য ব্রাউজার হয়, তবে এরর মেসেজ বা ব্লক পেজ দেখাবে
                document.getElementById('status').innerHTML = "<h1>Access Denied</h1><p>Please open this link inside Telegram.</p>";
                
                // ইচ্ছা করলে এখানেও রিডাইরেক্ট করতে পারেন অন্য কোনো সাইটে
                // window.location.href = "https://google.com";
            }
        })();
    </script>
</body>
</html>
